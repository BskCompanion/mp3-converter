<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Audio Converter (MP4/M4A → MP3)</title>

<link rel="stylesheet" href="style.css">

</head>
<body>

<div class="app">

    <h1>🎵 Audio Converter</h1>
    <p class="sub">Convert MP4 / M4A / WAV / FLAC → MP3 (runs in browser)</p>

    <div class="card">

        <div id="dropZone" class="drop-zone">
            <p>📂 Drag & Drop file here</p>
            <p>or</p>
            <input type="file" id="fileInput" accept="audio/*,video/*">
        </div>

        <div class="controls">

            <label>Bitrate</label>
            <select id="bitrate">
                <option value="128k">128 kbps</option>
                <option value="192k" selected>192 kbps</option>
                <option value="256k">256 kbps</option>
                <option value="320k">320 kbps</option>
            </select>

            <button id="convertBtn">Convert to MP3</button>

        </div>

        <div class="progress-container">
            <progress id="progress" value="0" max="100"></progress>
            <span id="status">Waiting for file...</span>
        </div>

        <div id="output"></div>

    </div>

</div>

<!-- IMPORTANT: JS will be provided in next step -->
<script type="module" src="script.js"></script>

</body>
</html>
